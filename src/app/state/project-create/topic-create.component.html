<form [formGroup]="form" (ngSubmit)="submit()">

  <label>Title</label>
  <input type="text" formControlName="title">

  <label>Emitter Type</label>
  <input type="text" formControlName="emitter_type">

  <label>Description</label>
  <textarea formControlName="description"></textarea>

  <button type="submit" [disabled]="facade.loading()">
    Save
  </button>

</form>

<div *ngIf="facade.loading()">
  Saving...
</div>

<div *ngIf="facade.success()">
  Topic created successfully!
</div>

<div *ngIf="facade.error()">
  Error saving topic
</div>
