<!-- TABS -->
<mat-tab-group class="custom-tabs">
  <mat-tab label="All"></mat-tab>
  <mat-tab label="Pending"></mat-tab>
  <mat-tab label="Starting"></mat-tab>
  <mat-tab label="Running"></mat-tab>
  <mat-tab label="Failed"></mat-tab>
  <mat-tab label="Completed"></mat-tab>
</mat-tab-group>

<!-- FILTER BAR -->
<div class="filter-container">

  <mat-form-field appearance="outline">
    <input matInput placeholder="ID">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <input matInput placeholder="Group ID">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <input matInput placeholder="Name">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <input matInput placeholder="Audio Date">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <input matInput placeholder="Format">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <input matInput placeholder="20/02/2024 - 20/02/2024">
  </mat-form-field>

  <button mat-stroked-button class="reset-btn">Reset</button>

  <button mat-raised-button color="primary" class="search-btn">
    🔍 Search
  </button>

</div>

<!-- TABLE -->
<table mat-table [dataSource]="[]" class="mat-elevation-z1">
  <ng-container matColumnDef="example">
    <th mat-header-cell *matHeaderCellDef> Example </th>
    <td mat-cell *matCellDef="let element"> Data </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="['example']"></tr>
  <tr mat-row *matRowDef="let row; columns: ['example'];"></tr>
</table>



<mat-form-field appearance="outline">
  <mat-label>Período</mat-label>

  <mat-date-range-input [rangePicker]="picker">
    <input matStartDate placeholder="Start date">
    <input matEndDate placeholder="End date">
  </mat-date-range-input>

  <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
  <mat-date-range-picker #picker></mat-date-range-picker>
</mat-form-field>
